<!DOCTYPE html>
<html>
<head>
<title>Set New Password</title>

<style>
body{
    background-image: url('reg image1.jpg'); 
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    color: white;
}

.form-container {
    width: 300px; 
    margin-top: 100px;
    margin-left: auto; 
    margin-right: 280px; 

    background: transparent; 
    padding: 30px 25px; 
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5); 
    position: relative; 
}

/* Heading for "Set New Password" */
.form-container h2 {
    text-align: center;
    color: white;
    margin-bottom: 5px; 
    font-size: 24px;
    font-weight: normal;
}

/* Description text below the title */
.description-text {
    text-align: center;
    color: #ccc;
    font-size: 13px;
    margin-bottom: 25px;
}

/* Style for input fields (consistent rounded look) */
.form-group {
    position: relative;
    margin-bottom: 20px;
}

/* Target all relevant input types */
.form-container input[type="text"],
.form-container input[type="password"] { 
    width: 100%;
    /* Added space for icons */
    padding: 10px 40px 10px 15px; 
    border: none;
    border-radius: 5px;
    box-sizing: border-box; 
    background-color: rgba(255, 255, 255, 0.9); 
    color: #333;
    font-size: 16px;
}

/* Placeholder color matching the soft look */
.form-container ::placeholder {
    color: #999;
    opacity: 1; 
}

/* Icon styling base */
.form-group::after {
    position: absolute;
    top: 50%;
    right: 15px;
    transform: translateY(-50%);
    color: #888;
    font-size: 18px;
}

/* Specific icons for each field */
.email-input::after {
    content: '✉'; /* Mail icon */
}

.password-input::after {
    content: '🔒'; /* Lock icon */
}

/* Styling for the Reset Password button */
.reset-button {
    width: 100%;
    padding: 12px; 
    border: none;
    border-radius: 20px; 
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    margin-top: 5px; 
    
    /* Green color matching the image/original code */
    background-color: #4CAF50; 
    color: white;
    transition: background-color 0.3s;
}

.reset-button:hover {
    background-color: #45a049;
}

/* Back to Login link area */
.login-back-link {
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
}

.login-back-link a {
    color: #4CAF50;
    text-decoration: none;
    font-weight: bold;
}

.login-back-link a:hover {
    text-decoration: underline;
}
</style>

<script>
function fun(){
    var form = document.forms.NewPasswordForm;
    var email = form.Email.value;
    var newPass = form.NewPassword.value;
    var confirmPass = form.ConfirmPassword.value;
    
    var regEmail = /^\S+@\S+\.\S+$/;

    // 1. Validate Email
    if(email == "" || !regEmail.test(email)){
        alert("Please enter a valid email address.");
        form.Email.focus();
        return false;
    }

    // 2. Validate New Password (example: must be at least 6 characters)
    if(newPass.length < 6){
        alert("New Password must be at least 6 characters long.");
        form.NewPassword.focus();
        return false;
    }
    
    // 3. Validate Confirm Password match
    if(newPass !== confirmPass){
        alert("New Password and Confirm Password do not match.");
        form.ConfirmPassword.focus();
        return false;
    }
    
    // If all checks pass, the form would typically be submitted to a server-side script
    // to update the password in the database.
    alert("Password updated successfully!");
    
    // Prevent actual form submission for this client-side demo
    return false;
}
</script>
</head>

<body>

<div class="form-container">
    <h2>Set New Password</h2>
    
    <div class="description-text">
        Enter your email and new password to reset it directly.
    </div>
    
    <form name="NewPasswordForm" onsubmit="return fun()" method="post">
    
        <div class="form-group email-input">
            <input type="text" name="Email" placeholder="Email" />
        </div>
        
        <div class="form-group password-input">
            <input type="password" name="NewPassword" placeholder="New Password" /> 
        </div>
        
        <div class="form-group password-input">
            <input type="password" name="ConfirmPassword" placeholder="Confirm Password" /> 
        </div>
        
        <input type="submit" value="Set Password" class="reset-button" />
        
    </form>
    
    <div class="login-back-link">
        <a href="login.html">Back to Login</a>
    </div>

</div>

</body>
</html>
