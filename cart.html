<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='UTF-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare Plus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* --- 1. Base Styles and Variables --- */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        :root {
            --primary-green: #053229; 
            --secondary-green: #355E58; 
            --white: #fff;
            --gray-text: #ccc;
            --dark-text: #333;
        }

        /* --- 2. Main Header (Top Section) --- */
        .main-header {
            background-color: var(--primary-green);
            height: 80px; 
            padding: 0 5%; 
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-delivery {
            display: flex;
            align-items: center;
            color: var(--white);
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            color: var(--white); 
        }

        .logo-text .beta {
            font-size: 10px;
            font-weight: normal;
            align-self: flex-end;
            margin-left: 5px;
            color: var(--gray-text);
        }

        .location-info {
            font-size: 14px;
            white-space: nowrap; 
            margin-left: 20px;
            color: var(--white);
            opacity: 0.9;
            display: none;
        }
        @media(min-width: 768px) { .location-info { display: block; } }

        .search-container {
            flex-grow: 1;
            display: flex;
            justify-content: center; 
            margin: 0 30px; 
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: var(--white);
            border-radius: 4px; 
            padding: 8px 15px;
            width: 500px; 
            max-width: 40vw; 
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .search-box input {
            border: none;
            outline: none;
            flex-grow: 1;
            font-size: 14px;
            padding: 0 10px;
            color: var(--dark-text);
        }

        .search-box .icon {
            color: #555;
            font-size: 16px;
        }
.real-dropdown {
    display: none;           /* Initially hidden */
    position: absolute;
    top: 100%;               
    left: 0;                 /* Start same as search bar */
    width: 550px;  /* Explicit width same as search-box */
    max-width: 100%; /* Responsive */
    background-color: #fff;
    border-radius: 8px;      /* Rounded corners */
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    overflow: hidden;
    z-index: 999;
}

/* Dropdown items */
.real-dropdown div {
    padding: 12px 15px;
    font-size: 14px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: background 0.2s ease;
}

/* Hover effect */
.real-dropdown div:hover {
    background-color: #f5f5f5;
}

/* Last item border removal */
.real-dropdown div:last-child {
    border-bottom: none;
}



        .user-actions {
            display: flex;
            align-items: center;
            color: var(--white);
        }

        .user-actions a {
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            margin-left: 25px; 
        }

        .user-actions a i { font-size: 22px; margin-right: 5px; }
        .user-actions a span { white-space: nowrap; }

        /* --- 3. Navigation Bar (Bottom Section) --- */
        .nav-bar {
            background-color: var(--secondary-green);
            color: var(--white);
            padding: 12px 5%;
            overflow-x: auto;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            justify-content: space-between;
            min-width: 800px;
        }

        .nav-links li {
            font-size: 14px; 
            font-weight: 500;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: color 0.2s;
            white-space: nowrap;
            margin: 0 10px;
        }

        .nav-links li:hover { color: #fff8e1; }
        .nav-links .icon { margin-right: 8px; font-size: 20px; }

.section-header {
            width: 95%;
            max-width: 1400px;
            margin: 20px auto 15px auto;
            color: #333;
        }
        .section-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }





.nav-links a {
    color: white;          /* text white */
    text-decoration: none; /* underline remove */
    display: flex;
    align-items: center;
}

.cart-container {
    width: 90%;
    max-width: 600px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.cart-container h2 {
    text-align: center;
    margin-bottom: 20px;
}
.cart-container h3 {
    text-align: center;
    margin-top: 20px;
}



    .cart-item { 
        display:flex; 
        align-items:center; 
        border-bottom:1px solid #ddd; 
        padding:10px 0;
    }
    .cart-item img { width:80px; margin-right:15px; }
    .qty-btn {
        padding:5px 10px;
        background:#333; 
        color:#fff; 
        cursor:pointer;
        margin:0 5px;
    }

.buy-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #053229;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
.buy-btn:hover {
    background: #075c4c;
}



</style>
</head>
<body>

<header>
    <div class="main-header">
        <div class="logo-delivery">
            <div class="logo-text">
                <i class="fas fa-house-chimney-medical" style="color: white; font-size: 30px; margin-right: 5px;"></i>
                HealthCare <span class="beta">Plus</span>
            </div>
            <div class="location-info" id="deliveryLocation">
                <i class="fas fa-map-marker-alt"></i> Deliver to Loading Address...
            </div>          
        </div>

        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search icon"></i> 
                <input type="text" placeholder="Search for medicines, lab tests, doctors & beauty">
<div class="real-dropdown" id="searchDropdown">
    <div onclick="goToPage('medicine.html')">Medicine</div>
    <div onclick="goToPage('babycare.html')">Baby Care</div>
    <div onclick="goToPage('beauty.html')">Beauty</div>
    <div onclick="goToPage('elderlycare.html')">Elderly Care</div>
    <div onclick="goToPage('health.html')">Health</div>
</div>

            </div>
        </div>
        
        <div class="user-actions">
            <a href="cart.html" class="cart-icon">
    <i class="fa fa-shopping-cart"></i>
    <span id="cart-count">0</span>
</a>
            <a href="Registration Form.html" class="sign-in-link"><i class="fas fa-user"></i><span>Sign In</span></a>
        </div>
    </div>

    <div class="nav-bar">
<ul class="nav-links">
<li><a href="main(starting pg).html"><i class="fas fa-list-ul icon"></i>All Categories</a></li>
<li><a href="medicine.html"><i class="fas fa-capsules icon"></i>Medicine</a></li>
<li><a href="babycare.html"><i class="fas fa-baby-carriage icon"></i>Baby Care</a></li>
<li><a href="beauty.html"><i class="fas fa-pump-soap icon"></i>Beauty</a></li>
<li><a href="elderlycare.html"><i class="fas fa-blind icon"></i>Elderly Care</a></li>
<li><a href="health.html"><i class="fas fa-plus icon"></i>Health Corner</a></li>
<li><a href="terms.html"><i class="fas fa-file-contract icon"></i>Terms & Conditions</a></li>
</ul>
</div>

</header>


<div class="cart-container">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: ₹<span id="total-price">0</span></h3>
</div>

<button onclick="buySelected()" class="buy-btn">Buy Selected</button>
<button onclick="buyAll()" class="buy-btn">Buy All</button>



<script>






let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart() {
    let container = document.getElementById("cart-items");
    container.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.quantity;

        container.innerHTML += `
    <div class="cart-item">
        <input type="checkbox" class="select-item" data-index="${index}">
        <img src="${item.image}">
        <div>
            <h4>${item.name}</h4>
            <p>Price: ₹${item.price}</p>
            <div>
                <span class="qty-btn" onclick="changeQty(${index}, -1)">-</span>
                <span>${item.quantity}</span>
                <span class="qty-btn" onclick="changeQty(${index}, 1)">+</span>
            </div>
        </div>
    </div>
`;
    });

    document.getElementById("total-price").innerText = total;
updateCartCount();
}

function changeQty(index, amount) {

cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart[index].quantity += amount;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    saveCart();
    renderCart(); 
}

renderCart();


function updateCartCount() {
    let count = 0;
    cart.forEach(item => count += item.quantity);
    document.getElementById("cart-count").innerText = count;
}


function buySelected() {
    let selectedItems = [];
    let checkboxes = document.querySelectorAll(".select-item");

    checkboxes.forEach(checkbox => {
        if (checkbox.checked) {
            selectedItems.push(cart[checkbox.dataset.index]);
        }
    });

    if (selectedItems.length === 0) {
        alert("Please select at least one product to proceed.");
        return;
    }

    let deliveryDate = "Tuesday, 9 April";

    alert(
        "🎉 Order Successful!\n\n" +
        "Your selected items have been placed successfully.\n" +
        "(Cash on Delivery)\n"+
        "Estimated Delivery: " + deliveryDate
    );
}

function buyAll() {
    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    let deliveryDate = "Tuesday, 9 April";

    alert(
        "🎉 Order Successful!\n\n" +
        "Your full cart order has been placed successfully.\n" +
        "(Cash on Delivery)\n"+
        "Estimated Delivery: " + deliveryDate
    );
}


document.addEventListener('DOMContentLoaded', function() {
        
        function getQueryParam(name) {
        name = name.replace(/[\[\]]/g, '\\$&');
        var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
            results = regex.exec(window.location.href);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    var deliveryAddress = getQueryParam('deliveryAddress');

        if (deliveryAddress) {
        localStorage.setItem("deliveryAddress", deliveryAddress);
    } else {
        
        deliveryAddress = localStorage.getItem("deliveryAddress");
    }

    var locationElement = document.getElementById('deliveryLocation');

    if (locationElement && deliveryAddress) {
        locationElement.innerHTML = 
            '<i class="fas fa-map-marker-alt"></i> Deliver to <b>' + deliveryAddress + '</b>';
    } else if (locationElement) {
        locationElement.innerHTML = 
            '<i class="fas fa-map-marker-alt"></i> Deliver to <b>Select Location</b>';
    }

});

const searchInput = document.querySelector(".search-box input");
const dropdown = document.getElementById("searchDropdown");

// Show dropdown on click
searchInput.addEventListener("click", () => {
    dropdown.style.display = "block";
});

// Hide dropdown when clicking outside
document.addEventListener("click", function(event) {
    if (!event.target.closest(".search-container") &&
        !event.target.closest("#searchDropdown")) {
        dropdown.style.display = "none";
    }
});

// Redirect to pages
function goToPage(page) {
    window.location.href = page;
}


</script>

</body>
</html>
