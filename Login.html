<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>

<style>
/* --- STYLES MODIFIED FOR LOGIN FORM LOOK --- */
body{
    /* Assuming 'reg image1.jpg' is your background image */
    background-image: url('images/reg image1.jpg'); 
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    color: white;
}

.form-container {
    /* Set to a proper compact width */
    width: 300px; 
margin-top: 150px;
    
    /* Center the box */
    margin-left: auto; 
    margin-right: 280px; 
    
    /* Dark, slightly transparent background */
    background: TRANSPARENT; 
    padding: 30px 25px; 
    border-radius: 10px;
    
    /* Soft shadow to match the image */
    box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5); 
    
    /* To contain the X button and title */
    position: relative; 
}

/* Heading for "Login" */
.form-container h2 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
    font-size: 24px;
    font-weight: normal;
}

/* Style for all input fields to match the image's rounded inputs */
.form-group {
    position: relative;
    margin-bottom: 20px;
}

.form-container input[type="text"],
.form-container input[type="password"] {
    width: 100%;
    padding: 10px 40px 10px 15px; /* Added space for icons */
    border: none;
    border-radius: 5px;
    box-sizing: border-box; 
    background-color: rgba(255, 255, 255, 0.9); /* Slightly opaque white background for fields */
    color: #333;
    font-size: 16px;
}

/* Placeholder color matching the soft look */
.form-container ::placeholder {
    color: #999;
    opacity: 1; 
}

/* Icon styling (using simple text for placeholders as real icons need an icon library/font) */
.form-group::after {
    position: absolute;
    top: 50%;
    right: 15px;
    transform: translateY(-50%);
    color: #888;
    font-size: 18px;
}

/* Specific icons (using common characters as substitutes) */
.form-group.email-input::after {
    content: '✉'; /* Mail icon */
}

.form-group.password-input::after {
    content: '🔒'; /* Lock icon */
}


/* Styling for the Login button */
.login-button {
    width: 100%;
    padding: 12px; 
    border: none;
    border-radius: 20px; /* More rounded button */
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    margin-top: 15px;
    
    /* Green color matching the image/original code */
    background-color: #4CAF50; 
    color: white;
    transition: background-color 0.3s;
}

.login-button:hover {
    background-color: #45a049;
}

/* Remember me & Forgot password layout */
.options-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-bottom: 5px;
}

.options-bar label {
    display: flex;
    align-items: center;
}

/* Checkbox styling (adjusting text size/color) */
.options-bar input[type="checkbox"] {
    margin-right: 5px;
    /* Optional: Custom checkbox styling would go here */
}

/* Forgot password link */
.options-bar a {
    color: #4CAF50; /* Green link color */
    text-decoration: none;
}

.options-bar a:hover {
    text-decoration: underline;
}

/* "Don't have an account" area */
.register-link {
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
}

.register-link a {
    color: #4CAF50;
    text-decoration: none;
    font-weight: bold;
}

.register-link a:hover {
    text-decoration: underline;
}
</style>

<script>
function fun(){
    var form = document.forms.LoginForm;
    var email = form.Email.value;
    var password = form.Password.value;

    var regEmail = /^\S+@\S+\.\S+$/;

    // Validation
    if(email == "" || !regEmail.test(email)){
        alert("Please enter a valid email address.");
        form.Email.focus();
        return false;
    }

    if(password == ""){
        alert("Please enter your password.");
        form.Password.focus();
        return false;
    }
    
    form.action="main(starting pg).html";
return true;
}
</script>
</head>

<body>

<div class="form-container">
    <h2>Login</h2>
    
    <form name="LoginForm" onsubmit="return fun()" method="post">
    
        <div class="form-group email-input">
            <input type="text" name="Email" placeholder="Email" />
        </div>
        
        <div class="form-group password-input">
            <input type="password" name="Password" placeholder="Password" />
        </div>
        
        <div class="options-bar">
            <label>
                <input type="checkbox" name="RememberMe" id="RememberMe" />
                Remember me
            </label>
            <a href="forgot password.html">Forgot password?</a>
        </div>
        
        <input type="submit" value="Login" class="login-button" />
        
    </form>
    
    <div class="register-link">
        Don't have an account? <a href="Registration form.html">Register</a>
    </div>

</div>

</body>
</html>
