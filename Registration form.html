<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
body{
    background-image: url('reg image1.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    color: white; 
}
.form-container {
    /* Set to a proper compact width */
    width: 280px; 

    margin-left: auto; 
    margin-right: 280px; /* Adjust this value to position it */
    background: transparent;
    padding: 20px; 
    border-radius: 10px;
    box-shadow: 0px 0px 10px #000;
}

/* Reduced spacing for paragraphs within the form */
.form-container p {
    margin-top: 5px;
    margin-bottom: 5px;
}

/* Style for all input fields and select */
.form-container input[type="text"],
.form-container input[type="password"],
.form-container select {
    width: 100%;
    padding: 5px; 
    margin-bottom: 10px; 
    border: 1px solid #444; 
    border-radius: 3px;
    box-sizing: border-box; 
    background-color: white; 
    color: black;
    font-size: 14px;
}

/* Style for the buttons */
.form-container input[type="submit"],
.form-container input[type="reset"] {
    padding: 8px 15px; 
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: background-color 0.3s;
}

/* Style for the Register (Submit) button - Green look */
.form-container input[type="submit"] {
    background-color: #4CAF50;
    color: white;
    margin-right: 5px;
}

.form-container input[type="submit"]:hover {
    background-color: #45a049
    color: white;
    margin-right: 5px;
}

/* Style for the Reset button - Green look */
.form-container input[type="reset"] {
    background-color: #4CAF50;
    color: white;
    margin-right: 5px;
}

.form-container input[type="reset"]:hover {
    background-color: #45a049
    color: white;
    margin-right: 5px;

}

.form-container input[type="reset"]:hover {
    background-color: #555;
}

/* Style for the "Already registered" line */
.already-registered {
    text-align: center;
    margin-top: 10px; 
    font-size: 12px;
}

.already-registered a {
    color: #4CAF50; 
    text-decoration: none;
    font-weight: bold;
}

.already-registered a:hover {
    text-decoration: underline;
}



/* Ensure the checkbox label text is visible and smaller */
.form-container label {
    color: white;
    font-size: 13px;
}
</style>

<script>
function fun(){
    var form = document.forms.RegForm;

    var name = form.Name.value;
    var email = form.Email.value;
    var phone = form.Telephone.value;
    var password = form.Password.value;
    var address = form.Address.value;
    var cityElement = form.City;
    var city = cityElement.options[cityElement.selectedIndex].text;

    var regEmail = /^\S+@\S+\.\S+$/;
    var regPhone = /^\d{10}$/;
    var regName = /^[A-Za-z ]+$/;

    if(name == "" || !regName.test(name)){
        alert("Please enter your name properly");
        form.Name.focus();
        return false;
    }

    if(address == ""){
        alert("Please enter your address");
        form.Address.focus();
        return false;
    }

    if(email == "" || !regEmail.test(email)){
        alert("Please enter a valid email");
        form.Email.focus();
        return false;
    }

    if(password == ""){
        alert("Please enter your password");
        form.Password.focus();
        return false;
    }

    if(password.length < 6){
        alert("Password should be at least 6 characters long");
        form.Password.focus();
        return false;
    }

    if(phone == "" || !regPhone.test(phone)){
        alert("Please enter a valid 10-digit phone number");
        form.Telephone.focus();
        return false;
    }

    if(city.selectedIndex == 0){
        alert("Please select your city");
        city.focus();
        return false;
    }
    var terms = form.Terms.checked;
    if(!terms){
    alert("You must agree to the Terms and Conditions");
    form.Terms.focus();
    return false;
}
    var encodedAddress = encodeURIComponent(address);
    var targetURL = "main.html?deliveryAddress=" + encodedAddress + ", " + city;
    window.location.href = targetURL;
    form.action="main.html";
    return false;
    return true;
}
</script>
</head>

<body>

<h1 style="text-align:right; color:white; margin-right:310px; margin-top:30px; font-size: 25px">REGISTRATION FORM</h1>

<div class="form-container">
<form name="RegForm" onsubmit="return fun()" method="get">

<p>Name: <br>
<input type="text" name="Name" placeholder="Enter your Name" /></p>

<p>Address: <br>
<input type="text" name="Address" placeholder=" Enter your Address" /></p>

<p>Email Address: <br>
<input type="text" name="Email" placeholder=" Enter your Email" /></p>

<p>Password: <br>
<input type="password" name="Password" placeholder=" Enter your Password"/></p>

<p>Telephone Number: <br>
<input type="text" name="Telephone" placeholder="Enter your Phone Number"/></p>

<p>Select Your City: <br>
<select name="City">
<option>Select City</option>
<option>Mumbai</option>
<option>Delhi</option>
<option>Pune</option>
<option>Chennai</option>
<option>Bengaluru</option>
<option>Gujarat</option>
</select></p>
<p>
    <input type="checkbox" name="Terms" id="Terms" />
    <label for="Terms">
        I agree to the <a href="terms.html" target="_blank" style="color:#4CAF50; text-decoration:underline;">Terms and Conditions</a>
    </label>
</p>


<p style="text-align:center;">
<input type="submit" value="Register" />

<input type="reset" value="Reset" />
</p>

</form>
<div class="already-registered">
    Already have an account? <a href="login.html">Login</a>
</div>

</div>

</body>
</html>
